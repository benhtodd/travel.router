[global]
   workgroup = WORKGROUP
   server string = Travel Router
   dns proxy = no
   domain master = no
   local master = yes
   preferred master = yes
   wins support = yes
   # Enable SMB2/3, disable SMB1 for security
   server min protocol = SMB2
   server max protocol = SMB3
   # Use NTLMv2 (modern Windows auth)
   lanman auth = no
   ntlm auth = yes
   # Improve performance
   socket options = TCP_NODELAY SO_KEEPALIVE
   # Logging
   log file = /var/log/samba/%m.log
   max log size = 1000
   logging = file

[files]
   comment = Travel Router File Share
   path = /home/shared
   browseable = yes
   writable = yes
   valid users = vmware
   public = no
   create mask = 0777
   directory mask = 0777
   guest ok = no
