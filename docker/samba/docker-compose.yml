services:
  samba:
    image: dperson/samba:latest
    container_name: samba
    network_mode: host
    environment:
      - TZ=America/New_York
    volumes:
      - /mnt/data/files:/mount/files
    command: >
      -u "teamuser;${SAMBA_PASSWORD}"
      -s "files;/mount/files;yes;no;no;teamuser"
    restart: unless-stopped
