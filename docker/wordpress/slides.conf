<Directory /var/www/html/wp-content/slides>
    Options +Indexes
    AllowOverride None
    Require all granted

    IndexOptions FancyIndexing HTMLTable VersionSort SuppressHTMLPreamble NameWidth=* DescriptionWidth=* IconHeight=16 IconWidth=16
    IndexOrderDefault Ascending Name

    HeaderName /slides-header.html
    ReadmeName /slides-footer.html

    AddIcon /wp-includes/images/media/spreadsheet.png .xls .xlsx
    AddIcon /wp-includes/images/media/presentation.png .ppt .pptx
    AddIcon /wp-includes/images/media/document.png .doc .docx
    AddIcon /wp-includes/images/media/video.png .mp4 .mov .avi
    AddIcon /wp-includes/images/media/audio.png .mp3 .wav
    AddIcon /wp-includes/images/media/archive.png .zip .gz .tar
    AddIcon /wp-includes/images/media/default.png .pdf
    DefaultIcon /wp-includes/images/media/default.png

    IndexIgnore .htaccess slides-header.html slides-footer.html
</Directory>

Alias /slides-header.html /var/www/html/wp-content/slides/slides-header.html
Alias /slides-footer.html /var/www/html/wp-content/slides/slides-footer.html
