<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f4f6f9;
    color: #333;
    margin: 0;
    padding: 0;
  }
  #wrapper {
    max-width: 860px;
    margin: 40px auto;
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    overflow: hidden;
  }
  #header {
    background: #1a1a2e;
    color: #fff;
    padding: 24px 32px;
  }
  #header h1 {
    margin: 0;
    font-size: 1.4em;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  #header p {
    margin: 6px 0 0;
    font-size: 0.85em;
    opacity: 0.6;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.9em;
  }
  th {
    background: #f0f2f5;
    padding: 10px 16px;
    text-align: left;
    font-weight: 600;
    color: #555;
    border-bottom: 1px solid #e0e0e0;
  }
  td {
    padding: 10px 16px;
    border-bottom: 1px solid #f0f0f0;
    vertical-align: middle;
  }
  tr:hover td {
    background: #f9f9ff;
  }
  tr:last-child td {
    border-bottom: none;
  }
  a {
    color: #3b5bdb;
    text-decoration: none;
    font-weight: 500;
  }
  a:hover {
    text-decoration: underline;
  }
  img { border: none; vertical-align: middle; margin-right: 6px; }
</style>
</head>
<body>
<div id="wrapper">
<div id="header">
  <h1>Event Files</h1>
  <p>Click a file to download</p>
</div>
