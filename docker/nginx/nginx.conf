server {
    listen 80;
    server_name _;

    # Portal — HTML/CSS/JS from GitHub repo
    root /usr/share/nginx/portal;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Files — served only when explicitly linked in HTML
    location /files/ {
        alias /usr/share/nginx/files/;
        autoindex off;
    }
}
